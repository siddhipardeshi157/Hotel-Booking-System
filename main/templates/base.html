{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resort Golden Tulip</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f7f7f7;
        }

        .navbar {
            background: #0b132b;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
        }

        footer {
            background: #0b132b;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Resort Golden Tulip</h2>
        <div>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'rooms' %}">Rooms</a>
            <a href="/booking/">Booking</a>
            <a href="{% url 'contact' %}">Contact</a>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Resort Golden Tulip
    </footer>

</body>
</html>
